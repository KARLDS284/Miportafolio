<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ApexDev | Portafolio Full-Stack</title>
    <!-- Favicon personalizado con el logo exacto de ApexDev -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Cpath d='M20 4 L6 34 L14 34 L20 18 Z' fill='%23ffffff'/%3E%3Cpath d='M20 4 L34 34 L26 34 L20 18 Z' fill='%23b5ff00'/%3E%3C/svg%3E">
    <!-- Fuentes de Google -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Librería Devicon para logos de tecnologías -->
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css" />
    <!-- Vinculación del archivo CSS externo -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Encabezado y Navegación -->
    <header>
        <nav class="navbar">
            <a href="#inicio" class="logo">
                <svg width="35" height="35" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <!-- Lado izquierdo de la A (Blanco) -->
                    <path d="M20 4 L6 34 L14 34 L20 18 Z" fill="#ffffff"/>
                    <!-- Lado derecho de la A (Verde Neón) -->
                    <path d="M20 4 L34 34 L26 34 L20 18 Z" fill="#b5ff00"/>
                </svg>
                Apex<span class="highlight">Dev.</span>
            </a>
            
            <ul class="nav-links">
                <li><a href="#inicio" class="nav-item active">Inicio</a></li>
                <li><a href="#proyectos" class="nav-item">Proyectos</a></li>
                <li><a href="#sobre-mi" class="nav-item">Sobre Mí</a></li>
            </ul>
            <button class="btn-talk">Contactame</button>
        </nav>
    </header>

    <!-- Sección Principal (Hero) -->
    <main class="hero-container" id="inicio">
        
        <!-- Bloque Izquierdo: Información y Estadísticas -->
        <section class="hero-left">
            <h1 class="hero-title">¡Hola Bro! Soy<br>Aaron</h1>
            
            <!-- Contenedor del efecto mecanografiado -->
            <div class="typewriter-box">
                <span class="typewriter-text" id="typewriter"></span>
                <span class="typewriter-cursor">|</span>
            </div>

            <div class="cta-group">
                <a href="https://github.com/KARLDS284" target="_blank" class="btn-primary">
                    Explorar GitHub <span class="arrow">→</span>
                </a>
            </div>

            <!-- Panel de Métricas / Datos Académicos y Personales -->
            <div class="metrics-grid">
                <div class="metric-item">
                    <h3 class="metric-value">100<span>%</span></h3>
                    <p class="metric-label">Enfoque Web<br>Full-Stack</p>
                </div>
                <div class="metric-item">
                 <img src="logo.unermb.png" alt="Logo UNERMB" class="unermb-logo">
    
                  <p class="metric-label">Ingeniería en<br>Informática</p>
                 </div>
                <div class="metric-item">
                    <h3 class="metric-value">+1<span></span></h3>
                    <p class="metric-label">Proyecto Frontend<br>en Desarrollo</p>
                </div>
            </div>
        </section>

        <!-- Bloque Derecho: Imagen de Marca y Tecnologías -->
       <section class="hero-right">
    <img src="mi-perfil.png" class="profile-image" alt="Mi Foto">
            <!-- Barra lateral de especializaciones técnicas (Logos B&N) -->
            <aside class="tech-sidebar">
                <div class="tech-sidebar-title">STACK PRINCIPAL</div>
                <div class="tech-badge" title="JavaScript"><i class="devicon-javascript-plain"></i></div>
                <div class="tech-badge" title="HTML5"><i class="devicon-html5-plain"></i></div>
                <div class="tech-badge" title="CSS3"><i class="devicon-css3-plain"></i></div>
                <div class="tech-badge" title="Git"><i class="devicon-git-plain"></i></div>
                <div class="tech-badge" title="GitHub"><i class="devicon-github-original"></i></div>
                <div class="tech-badge" title="Node.js"><i class="devicon-nodejs-plain"></i></div>
                <div class="tech-badge" title="React"><i class="devicon-react-original"></i></div>
                <div class="tech-badge" title="Python"><i class="devicon-python-plain"></i></div>
                <div class="tech-badge" title="Django"><i class="devicon-django-plain"></i></div>
            </aside>
        </section>

    </main>

    <!-- Vinculación del archivo JavaScript externo -->
    <script src="script.js"></script>
</body>
</html>
